<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Genomic Surveillance Engine</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: Inter, Arial, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #alert-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(20, 20, 30, 0.95);
            color: #f8f8f2;
            padding: 16px;
            width: 320px;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 8px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
            z-index: 1;
        }
        #alert-panel h3 {
            margin: 0 0 10px;
            font-size: 16px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #ffd166;
        }
        #status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: #cbd5e1;
            font-size: 13px;
        }
        #status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #f59e0b;
            flex: 0 0 auto;
        }
        #status.connected #status-dot { background: #22c55e; }
        #status.offline #status-dot { background: #ef4444; }
        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        button, select {
            min-height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 8px;
            background: #111827;
            color: #f8fafc;
            font: inherit;
        }
        button {
            cursor: pointer;
            background: #2563eb;
            font-weight: 700;
        }
        button:hover { background: #1d4ed8; }
        button:disabled {
            cursor: not-allowed;
            background: #334155;
            color: #94a3b8;
        }
        #summary {
            margin-bottom: 10px;
            color: #e2e8f0;
            font-size: 13px;
        }
        #logs p {
            margin: 8px 0;
            line-height: 1.4;
            color: #e9edf5;
            font-size: 13px;
            overflow-wrap: anywhere;
        }
        #legend {
            margin-top: 16px;
            font-size: 13px;
            color: #cbd5e1;
        }
        .legend-scale {
            margin-top: 8px;
            height: 10px;
            border-radius: 6px;
            background: linear-gradient(90deg, rgba(0, 255, 0, 1) 0%, rgba(118, 220, 91, 1) 25%, rgba(255, 223, 80, 1) 50%, rgba(255, 170, 0, 1) 75%, rgba(204, 0, 0, 1) 100%);
        }
    </style>
</head>
<body>
    <div id="alert-panel">
        <h3>LIVE CASE HEATMAP</h3>
        <div id="status" class="offline">
            <span id="status-dot"></span>
            <span id="status-text">Connecting to backend...</span>
        </div>
        <div id="controls">
            <select id="case-type" aria-label="Case type">
                <option value="mpox">mpox</option>
                <option value="dengue">dengue</option>
                <option value="covid-variant">covid-variant</option>
                <option value="influenza">influenza</option>
            </select>
            <button id="simulate-case" type="button">Add case</button>
        </div>
        <div id="summary">0 cases loaded</div>
        <div id="logs"></div>
        <div id="legend">
            <div>Heatmap intensity</div>
            <div class="legend-scale"></div>
            <div style="margin-top: 8px;">Green = low | Red = high</div>
        </div>
    </div>
    <div id="map"></div>
    <script>
        // Override endpoints when deployed to a remote host.
        // Replace these values with your hosted backend and raster service URLs.
        window.APP_CONFIG = window.APP_CONFIG || {
            API_BASE: 'http://localhost:3000',
            WS_URL: 'ws://localhost:3000',
            RASTER_TILE_URL: 'http://localhost:8000/tiles/{z}/{x}/{y}.png'
        };
    </script>
    <script src="app.js"></script>
</body>
</html>
